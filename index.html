<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()" data-theme="dim">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaulti</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-base-200 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="navbar sticky top-0 z-10 bg-base-100 border-b shadow-sm px-4 gap-2">
    <div class="navbar-start">
      <a class="navbar-brand font-bold text-base-content" href="#">
        <i class="bi bi-collection-fill mr-2 text-primary"></i>Vaulti
      </a>
    </div>
    <div class="navbar-end gap-2">
      <div class="relative" x-cloak>
        <i class="bi bi-search absolute top-1/2 left-0 -translate-y-1/2 ml-3 text-base-content/70 text-sm"></i>
        <input type="search" class="input input-bordered input-sm pl-5 w-[200px]" placeholder="Search..." x-model="search">
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="container mx-auto py-4 flex-1" x-cloak>

    <!-- Loading -->
    <div x-show="!loaded" class="text-center py-5">
      <div class="loading loading-spinner text-primary mb-3"></div>
      <p class="text-base-content/70">Loading resources...</p>
    </div>

    <template x-if="loaded">
      <div>
        <!-- Counter and clear filters -->
        <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
          <small class="text-base-content/70">
            Showing <strong x-text="filteredResources.length"></strong> of <strong x-text="resources.length"></strong> resources
          </small>
          <button class="btn btn-sm btn-outline" @click="search=''; selectedCategory='all'; selectedPricing='all'; showFavoritesOnly=false" x-show="search || selectedCategory!=='all' || selectedPricing!=='all' || showFavoritesOnly">
            <i class="bi bi-x-circle mr-1"></i>Clear filters
          </button>
        </div>

        <!-- Pricing filter -->
        <div class="flex flex-wrap gap-1 mb-3">
          <template x-for="p in pricingOptions" :key="p">
            <button class="btn btn-sm" :class="selectedPricing === p ? 'btn-primary' : 'btn-outline'" @click="selectedPricing = p" x-text="p === 'all' ? 'All' : p.charAt(0).toUpperCase() + p.slice(1)"></button>
          </template>
        </div>

        <!-- Favorites toggle -->
        <div class="mb-3">
          <button class="btn btn-sm" :class="showFavoritesOnly ? 'btn-warning' : 'btn-outline'" @click="showFavoritesOnly = !showFavoritesOnly">
            <i class="bi" :class="showFavoritesOnly ? 'bi-star-fill' : 'bi-star'"></i><span class="ml-1">Favorites</span>
          </button>
        </div>

        <!-- Category filter -->
        <div class="flex flex-wrap gap-2 mb-4">
          <template x-for="cat in categoryOptions" :key="cat">
            <span class="badge px-3 py-2 cursor-pointer" :class="selectedCategory === cat ? 'badge-primary' : 'badge-ghost text-base-content/70'" @click="selectedCategory = cat" x-text="cat === 'all' ? 'All' : cat.charAt(0).toUpperCase() + cat.slice(1)"></span>
          </template>
        </div>

        <!-- Card grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
          <template x-for="(r, i) in filteredResources" :key="r.url">
            <div :style="`animation-delay:${(i%8)*0.05}s`">
              <div class="card bg-base-100 card-bordered border border-base-300 shadow-sm cursor-pointer h-full overflow-hidden" @click="openDetail(r)">
                <div class="bg-base-200 flex items-center justify-center h-[120px] shrink-0" x-data="{ faviconError: false }">
                  <img :src="`https://www.google.com/s2/favicons?domain=${r.domain}&sz=64`" alt="" class="max-w-full max-h-16" loading="lazy" @error="faviconError = true" x-show="!faviconError">
                  <i x-show="faviconError" class="bi bi-globe2 text-base-content/70 text-[2.5rem]"></i>
                  <i class="bi absolute top-0 right-0 mr-1" :class="isFavorite(r.url) ? 'bi-star-fill text-warning' : 'bi-star text-base-content/70'" @click.stop="toggleFavorite(r)"></i>
                </div>
                <div class="card-body flex flex-col flex-1">
                  <div class="flex justify-between items-start mb-1">
                    <h6 class="card-title mb-0 truncate" x-text="r.title"></h6>
                    <span class="badge ml-1 flex-shrink-0 text-[0.65rem]" :class="r.pricing === 'free' ? 'badge-success' : 'badge-warning'" x-text="r.pricing"></span>
                  </div>
                  <p class="card-text text-sm text-base-content/70 mb-2" x-text="r.description.length > 100 ? r.description.slice(0,100)+'...' : r.description"></p>
                  <div class="flex flex-wrap gap-1 mt-auto">
                    <span class="badge badge-primary badge-outline" x-text="r.category"></span>
                    <template x-for="tag in r.tags.slice(0,3)" :key="tag">
                      <span class="badge badge-ghost text-base-content/70" x-text="tag"></span>
                    </template>
                    <small x-show="r.tags.length > 3" class="text-base-content/70">+<span x-text="r.tags.length-3"></span></small>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- No results -->
        <div x-show="filteredResources.length === 0" class="text-center py-5">
          <i class="bi bi-search text-base-content/70 text-[3rem]"></i>
          <p class="text-base-content/70 mt-2">No resources found matching those filters.</p>
        </div>

      </div>
    </template>

  </main>

  <!-- Footer -->
  <footer class="border-t py-3 bg-base-100 text-center text-base-content/70 text-sm">
    <div class="container mx-auto">
      <i class="bi bi-collection mr-1"></i>Vaulti &mdash; <span x-text="resources.length"></span> curated resources
    </div>
  </footer>

  <!-- Detail modal -->
  <dialog id="detailModal" class="modal">
    <div class="modal-box" x-data="{ r: null }">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <template x-if="r">
        <div>
          <div class="flex items-center justify-between border-b pb-3">
            <h3 class="font-bold text-lg" x-text="r.title"></h3>
            <i class="bi mr-2" :class="isFavorite(r.url) ? 'bi-star-fill text-warning' : 'bi-star text-base-content/70'" @click="toggleFavorite(r)"></i>
          </div>
          <div class="py-4">
            <p class="mb-1"><strong>Description</strong></p>
            <p class="text-base-content/70" x-text="r.description"></p>
            <div class="grid grid-cols-2 gap-2 mb-3">
              <div>
                <small class="text-base-content/70">Category</small>
                <div><span class="badge badge-primary badge-outline" x-text="r.category"></span></div>
              </div>
              <div>
                <small class="text-base-content/70">Pricing</small>
                <div><span class="badge" :class="r.pricing === 'free' ? 'badge-success' : 'badge-warning'" x-text="r.pricing"></span></div>
              </div>
            </div>
            <template x-if="r.tags.length">
              <div class="mb-3">
                <small class="text-base-content/70">Tags</small>
                <div class="flex flex-wrap gap-1 mt-1">
                  <template x-for="tag in r.tags" :key="tag">
                    <span class="badge badge-ghost text-base-content/70" x-text="tag"></span>
                  </template>
                </div>
              </div>
            </template>
            <p class="mb-0 truncate">
              <i class="bi bi-link-45deg mr-1"></i>
              <a :href="r.url" target="_blank" rel="noopener" class="break-all" x-text="r.url"></a>
            </p>
          </div>
          <div class="flex justify-end gap-2 pt-3 border-t">
            <a :href="r.url" target="_blank" rel="noopener" class="btn btn-primary">
              <i class="bi bi-box-arrow-up-right mr-1"></i>Open site
            </a>
            <form method="dialog">
              <button class="btn btn-outline">Close</button>
            </form>
          </div>
        </div>
      </template>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>

  <script>
    function app() {
      return {
        resources: [],
        loaded: false,
        search: '',
        selectedCategory: 'all',
        selectedPricing: 'all',
        showFavoritesOnly: false,
        favorites: JSON.parse(localStorage.getItem('vaulti-favs') || '[]'),

        get categories() {
          return [...new Set(this.resources.map(r => r.category))];
        },

        get categoryOptions() {
          return ['all', ...this.categories];
        },

        get pricingOptions() {
          return ['all', ...new Set(this.resources.map(r => r.pricing))];
        },

        get filteredResources() {
          return this.resources.filter(r => {
            const q = this.search.toLowerCase().trim();
            if (q && !r.title.toLowerCase().includes(q) && !r.description.toLowerCase().includes(q) && !r.tags.some(t => t.toLowerCase().includes(q))) {
              return false;
            }
            if (this.selectedCategory !== 'all' && r.category !== this.selectedCategory) return false;
            if (this.selectedPricing !== 'all' && r.pricing !== this.selectedPricing) return false;
            if (this.showFavoritesOnly && !this.favorites.includes(r.url)) return false;
            return true;
          });
        },

        init() {
          fetch('https://raw.githubusercontent.com/itsmmunoz/vaulti/refs/heads/main/data/resources.json')
            .then(res => res.json())
            .then(data => {
              this.resources = data;
              this.loaded = true;
            })
            .catch(err => {
              console.error('Error loading resources:', err);
              this.loaded = true;
            });
        },

        isFavorite(url) {
          return this.favorites.includes(url);
        },

        toggleFavorite(r) {
          const idx = this.favorites.indexOf(r.url);
          if (idx === -1) {
            this.favorites.push(r.url);
          } else {
            this.favorites.splice(idx, 1);
          }
          localStorage.setItem('vaulti-favs', JSON.stringify(this.favorites));
        },

        openDetail(r) {
          const el = document.getElementById('detailModal');
          const alpineEl = el.querySelector('[x-data]');
          const scope = Alpine.$data(alpineEl);
          scope.r = r;
          el.showModal();
        }
      };
    }
  </script>

  <div class="gtranslate_wrapper"></div>
  <script>window.gtranslateSettings = {"default_language":"en","languages":["en","es"],"wrapper_selector":".gtranslate_wrapper","float_switcher_open_direction":"bottom","alt_flags":{"en":"usa","pt":"brazil","es":"colombia"}}</script>
  <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
</body>
</html>
